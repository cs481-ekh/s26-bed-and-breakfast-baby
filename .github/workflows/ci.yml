name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set execute bits
        run: chmod +x ./build.sh ./test.sh ./clean.sh || true

      - name: Build
        run: ./build.sh

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set execute bits
        run: chmod +x ./build.sh ./test.sh ./clean.sh || true

      - name: Test
        run: ./test.sh

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans