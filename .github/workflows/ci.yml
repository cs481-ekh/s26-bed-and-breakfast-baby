name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        run: |
          chmod +x ./build.sh ./test.sh
          ./build.sh

      - name: Test
        run: |
          ./test.sh

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v --remove-orphans
